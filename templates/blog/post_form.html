{% extends 'base.html' %}

{% block title %}{{ action|default:'Post' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">📝 Post {{ action }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Sarlavha</label>
                        <input type="text" name="title" class="form-control"
                               value="{{ post.title|default:'' }}"
                               placeholder="Post sarlavhasi" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Matn</label>
                        <textarea name="content" class="form-control" rows="8"
                                  placeholder="Post matni..." required>{{ post.content|default:'' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Saqlash</button>
                        <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
